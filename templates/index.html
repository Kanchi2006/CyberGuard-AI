<!DOCTYPE html>
<html>
<head>
    <title>CyberGuard AI</title>
    <style>
        body {
            background: black;
            font-family: 'Courier New', monospace;
            color: #00ffcc;
            text-align: center;
            padding-top: 100px;
        }

        .card {
            border: 2px solid #00ffcc;
            width: 420px;
            margin: auto;
            padding: 40px;
            box-shadow: 0 0 20px #00ffcc;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 15px;
            background: black;
            color: #00ffcc;
            border: 1px solid #00ffcc;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #00ffcc;
            color: black;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            box-shadow: 0 0 20px #00ffcc;
        }

        h2 {
            text-shadow: 0 0 10px #00ffcc;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🔐 CYBERGUARD AI</h2>
    <p>Advanced Phishing Detection System</p>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter suspicious URL..." required>
        <br>
        <button type="submit">⚡ Scan URL</button>
    </form>

    <br>
    <a href="/login" style="color:#00ffcc;">Admin Login</a>
</div>
<script>
document.querySelector("form").addEventListener("submit", function() {
    let button = document.querySelector("button");
    button.innerHTML = "Scanning...";
    button.disabled = true;
});
</script>
</body>
</html>
