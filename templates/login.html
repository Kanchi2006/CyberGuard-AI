<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            font-family: Arial;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .card {
            background-color: #1f2a40;
            padding: 40px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background-color: #00c6ff;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Login</h2>
    <form method="POST">
        <label>Username:</label><br>
        <input type="text" name="username" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <button type="submit">Login</button>
    </form>

    <br>
    <a href="/register">Create new account</a>

</div>

</body>
</html>
